<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelMate AI</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>✈️ TravelMate</h1>

        <div class="status" id="status">
            Ready
        </div>

        <button id="talkBtn" class="mic-btn">
            🎤
        </button>

        <div class="chat">

            <div class="message user">
                <span>You:</span>
                <div id="transcript">
                    Say something...
                </div>
            </div>

            <div class="message bot">
                <span>TravelMate:</span>
                <div id="response">
                    I'm ready to help with your trip.
                </div>
            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
